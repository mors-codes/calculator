<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="calculator">
    <h1 class="title">Calculator</h1>

    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>

    <div class="divider"></div>

    <div class="buttons">
      <button class="btn btn-red" id="ac">AC</button>
      <button class="btn btn-orange" id="del">DEL</button>

      <button class="btn btn-dark" data-value="1">1</button>
      <button class="btn btn-dark" data-value="2">2</button>
      <button class="btn btn-dark" data-value="3">3</button>
      <button class="btn btn-purple" data-value="/">÷</button>

      <button class="btn btn-dark" data-value="4">4</button>
      <button class="btn btn-dark" data-value="5">5</button>
      <button class="btn btn-dark" data-value="6">6</button>
      <button class="btn btn-purple" data-value="*">×</button>

      <button class="btn btn-dark" data-value="7">7</button>
      <button class="btn btn-dark" data-value="8">8</button>
      <button class="btn btn-dark" data-value="9">9</button>
      <button class="btn btn-purple" data-value="+">+</button>

      <button class="btn btn-dark" data-value=".">.</button>
      <button class="btn btn-dark" data-value="0">0</button>
      <button class="btn btn-purple" id="equals">=</button>
      <button class="btn btn-purple" data-value="-">▬</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
